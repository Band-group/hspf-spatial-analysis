# Note: all values must be strings, otherwise snakemake gets confused
data:
   pf:
      annie-version: "input/hbs-pf-annie.sqlite"
params:
   pf_data_version:
      - "annie-version"
   r0:
      - "25.0"
   sigma0:
      - "0.6"
   type:
      - "hexagon"
   hbs_covariates:
      - "none"
   hspf_covariates:
      - "none"
   divide:
      - "none"
   size:
      # Africa is 3,736.69km across West-East at Equator
      # 6,604.55km from coast of Gambia to coast of Kenya
      # At equator, 1 degree ~ 111km so 1.35 degrees ~ 150 km at the equator
      - "1"
   locus:
      - "CLAG3.2:140167"
      - "FIKK3:79845"
      - "REX2:1428875"
      - "CRT"
      - "PTP7:96476"
      - "Pfsa2-west"
      - "AAT1"
   regression_model:
      - "bym2"
   min_km_to_survey_pt:
      - "200"
   min_N:
      - "0"
   area:
      - global
      - africa
      - waf
      - eaf
